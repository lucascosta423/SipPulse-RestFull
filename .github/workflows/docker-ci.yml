name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: sippulse-rest-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify -B

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}"

          if [[ "${VERSION}" == *"-beta"* ]]; then
            TAGS="${TAGS}"$'\n'"${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:beta"
          elif [[ "${VERSION}" == *"-rc"* ]]; then
            TAGS="${TAGS}"$'\n'"${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:rc"
          else
            TAGS="${TAGS}"$'\n'"${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          fi

          {
            echo "IMAGE_TAGS<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
